{% extends "base.html" %}

{% block title %}Reset Password - Todo App Pro{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card fade-in">
            <div class="card-header text-center">
                <h3 class="mb-0">🔐 Reset Password</h3>
                <p class="mb-0 mt-2">Create a new password for your account</p>
            </div>
            <div class="card-body">
                <form id="resetPasswordForm" method="POST" action="{{ url_for('auth.reset_password') }}">
                    <input type="hidden" name="token" value="{{ token }}">
                    
                    <div class="mb-3">
                        <label for="new_password" class="form-label">New Password *</label>
                        <div class="input-group">
                            <input type="password" 
                                   class="form-control" 
                                   id="new_password" 
                                   name="new_password" 
                                   required 
                                   minlength="8"
                                   placeholder="Enter new password">
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('new_password')">
                                👁️
                            </button>
                        </div>
                        <div class="form-text">
                            Must be at least 8 characters with at least one letter and one number.
                        </div>
                        <div class="password-strength mt-2" id="passwordStrength"></div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label">Confirm New Password *</label>
                        <div class="input-group">
                            <input type="password" 
                                   class="form-control" 
                                   id="confirm_password" 
                                   name="confirm_password" 
                                   required 
                                   placeholder="Confirm new password">
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('confirm_password')">
                                👁️
                            </button>
                        </div>
                        <div class="invalid-feedback" id="confirmError"></div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100" id="resetBtn">
                        <span class="spinner-border spinner-border-sm d-none" role="status"></span>
                        Reset Password
                    </button>
                </form>
                
                <div class="text-center mt-4">
                    <a href="{{ url_for('web.login_page') }}" class="text-decoration-none">
                        ← Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Password strength checker
document.getElementById('new_password').addEventListener('input', function() {
    const password = this.value;
    const strengthIndicator = document.getElementById('passwordStrength');
    
    let strength = 0;
    if (password.length >= 8) strength++;
    if (password.match(/[a-z]+/)) strength++;
    if (password.match(/[A-Z]+/)) strength++;
    if (password.match(/[0-9]+/)) strength++;
    if (password.match(/[$@#&!]+/)) strength++;
    
    let strengthText = '';
    let strengthClass = '';
    
    switch(strength) {
        case 0:
        case 1:
            strengthText = 'Weak';
            strengthClass = 'text-danger';
            break;
        case 2:
        case 3:
            strengthText = 'Medium';
            strengthClass = 'text-warning';
            break;
        case 4:
        case 5:
            strengthText = 'Strong';
            strengthClass = 'text-success';
            break;
    }
    
    if (password.length > 0) {
        strengthIndicator.innerHTML = `<small class="${strengthClass}">Password Strength: ${strengthText}</small>`;
    } else {
        strengthIndicator.innerHTML = '';
    }
    
    checkPasswordMatch();
});

// Password confirmation checker
function checkPasswordMatch() {
    const password = document.getElementById('new_password').value;
    const confirm = document.getElementById('confirm_password').value;
    const confirmError = document.getElementById('confirmError');
    
    if (password !== confirm) {
        confirmError.textContent = 'Passwords do not match';
        document.getElementById('confirm_password').classList.add('is-invalid');
        return false;
    } else {
        confirmError.textContent = '';
        document.getElementById('confirm_password').classList.remove('is-invalid');
        return true;
    }
}

document.getElementById('confirm_password').addEventListener('input', checkPasswordMatch);
document.getElementById('new_password').addEventListener('input', checkPasswordMatch);

// Toggle password visibility
function togglePassword(fieldId) {
    const field = document.getElementById(fieldId);
    const type = field.getAttribute('type') === 'password' ? 'text' : 'password';
    field.setAttribute('type', type);
}

// Form submission
document.getElementById('resetPasswordForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    if (!checkPasswordMatch()) {
        return;
    }
    
    const submitBtn = document.getElementById('resetBtn');
    const spinner = submitBtn.querySelector('.spinner-border');
    
    submitBtn.disabled = true;
    spinner.classList.remove('d-none');
    
    const formData = new FormData(this);
    
    try {
        const response = await fetch(this.action, {
            method: 'POST',
            body: formData
        });
        
        if (response.redirected) {
            // Handle redirect response
            window.location.href = response.url;
        } else {
            const result = await response.json();
            
            if (result.success) {
                showNotification(result.message, 'success');
                setTimeout(() => {
                    window.location.href = result.redirect || '{{ url_for("web.login_page") }}';
                }, 2000);
            } else {
                showNotification(result.error, 'danger');
            }
        }
    } catch (error) {
        console.error('Error:', error);
        showNotification('An error occurred. Please try again.', 'danger');
    } finally {
        submitBtn.disabled = false;
        spinner.classList.add('d-none');
    }
});

function showNotification(message, type) {
    const alertDiv = document.createElement('div');
    alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
    alertDiv.innerHTML = `
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    `;
    document.querySelector('.container').insertBefore(alertDiv, document.querySelector('.container').firstChild);
    
    setTimeout(() => {
        alertDiv.remove();
    }, 5000);
}
</script>

<style>
.fade-in {
    animation: fadeIn 0.5s ease-in;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.card {
    border: none;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.card-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-bottom: none;
    color: white;
}

.btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
    transition: transform 0.2s;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
}

.password-strength {
    font-size: 0.875em;
    margin-top: 0.25rem;
}
</style>
{% endblock %}
